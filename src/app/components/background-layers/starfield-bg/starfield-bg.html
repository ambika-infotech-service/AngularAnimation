<div class="starfield" aria-hidden="true">
  @for (star of stars; track star.id) {
    <div
      class="star"
      [style.left.%]="star.x"
      [style.top.%]="star.y"
      [style.width.px]="star.size"
      [style.height.px]="star.size"
      [style.animation-duration]="star.duration + 's'"
      [style.animation-delay]="star.delay + 's'"
    ></div>
  }
  <div class="shooting-star"></div>
  <div class="shooting-star delay-1"></div>
  <div class="shooting-star delay-2"></div>
</div>
